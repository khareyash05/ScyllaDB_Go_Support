openapi: 3.0.0
info:
  title: Trivia API
  description: REST API for managing trivia facts. Base URL `/api`.
  version: 1.1.0
servers:
  - url: /
paths:
  /api/health:
    get:
      summary: Health check
      description: Health check endpoint for load balancers and probes.
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: trivia-api
                  version:
                    type: string
                    example: "1.0.0"
                    description: API version
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-15T10:00:00Z"
                    description: Server time in RFC3339 format
  /api/version:
    get:
      summary: Get API version
      description: Returns API version for client compatibility checks.
      responses:
        "200":
          description: Version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                    example: "1.1.0"
                  api:
                    type: string
                    example: trivia
                  build:
                    type: string
                    example: production
                    description: Build environment
                  region:
                    type: string
                    example: "us-east"
                    description: Server region
  /api/facts:
    get:
      summary: List facts
      description: List trivia facts with optional pagination.
      parameters:
        - name: limit
          in: query
          description: Max facts to return (1-1000)
          required: false
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          description: Number of facts to skip (pagination)
          required: false
          schema:
            type: integer
            default: 0
        - name: sort
          in: query
          description: Sort order asc (oldest first) or desc (newest first)
          required: false
          schema:
            type: string
            default: desc
            enum: [asc, desc]
      responses:
        "200":
          description: JSON array of facts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fact'
    post:
      summary: Create fact
      description: Create a new trivia fact.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactInput'
      responses:
        "201":
          description: The created fact
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fact'
        "500":
          description: Internal Server Error
  /api/facts/search:
    get:
      summary: Search facts
      description: Search trivia facts.
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fact'
  /api/facts/{id}:
    get:
      summary: Get fact
      description: Fetch a single fact by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The fact object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fact'
        "400":
          description: Bad Request
        "404":
          description: Not Found
    patch:
      summary: Update fact
      description: Update a fact by ID. Accepts partial updates.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FactUpdate'
      responses:
        "200":
          description: The updated fact object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Fact'
        "400":
          description: Bad Request
        "404":
          description: Not Found
    delete:
      summary: Delete fact
      description: Delete a fact by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found
components:
  schemas:
    Fact:
      type: object
      properties:
        ID:
          type: integer
          example: 1
        question:
          type: string
          example: "What is the capital of France?"
        answer:
          type: string
          example: "Paris"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:00:00Z"
    FactInput:
      type: object
      required:
        - question
        - answer
      properties:
        question:
          type: string
          description: The trivia question
        answer:
          type: string
          description: The answer
    FactUpdate:
      type: object
      properties:
        question:
          type: string
          description: Updated question
        answer:
          type: string
          description: Updated answer
    