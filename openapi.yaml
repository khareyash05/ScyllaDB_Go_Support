openapi: 3.0.0
info:
  title: Trivia API
  description: REST API for managing trivia facts.
  version: 1.0.0
servers:
  - url: /
paths:
  /api/health:
    get:
      summary: Health check
      description: Health check endpoint for load balancers and probes.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  service:
                    type: string
                  version:
                    type: string
                  timestamp:
                    type: string
  /api/version:
    get:
      summary: Get API version
      description: Returns API version.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    type: string
                  api:
                    type: string
                  build:
                    type: string
  /api/facts/count:
    get:
      summary: Get facts count
      description: Returns the total number of facts. Useful for pagination UIs.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
  /api/facts:
    get:
      summary: List facts
      description: List trivia facts with optional pagination.
      parameters:
        - name: limit
          in: query
          required: false
          description: Max facts to return (1-1000)
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          required: false
          description: Number of facts to skip (pagination)
          schema:
            type: integer
            default: 0
        - name: sort
          in: query
          required: false
          description: Sort order asc or desc
          schema:
            type: string
            default: desc
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fact"
    post:
      summary: Create a fact
      description: Creates a new trivia fact.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FactInput"
      responses:
        "201":
          description: Fact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
        "500":
          description: Server error
  /api/facts/search:
    get:
      summary: Search facts
      description: Searches for facts by question or answer keywords.
      parameters:
        - name: q
          in: query
          required: true
          description: Keyword to search in questions or answers
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fact"
        "400":
          description: Bad request (missing q parameter)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "query parameter 'q' is required"
  /api/facts/random:
    get:
      summary: Get a random fact
      description: Returns a single random fact.
      responses:
        "200":
          description: Random fact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
  /api/facts/{id}:
    get:
      summary: Get a fact by ID
      description: Returns a single trivia fact by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Fact ID
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: The fact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
        "400":
          description: Bad Request
        "404":
          description: Not Found
    patch:
      summary: Update a fact
      description: Update a fact by ID. Accepts partial updates (only provided fields are updated).
      parameters:
        - name: id
          in: path
          required: true
          description: Fact ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FactInput"
      responses:
        "200":
          description: The updated fact object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
        "400":
          description: Bad Request
        "404":
          description: Not Found
    delete:
      summary: Delete a fact
      description: Delete a fact by ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Fact ID
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
        "404":
          description: Not Found
components:
  schemas:
    Fact:
      type: object
      properties:
        ID:
          type: integer
          example: 1
        question:
          type: string
          example: "What is the capital of France?"
        answer:
          type: string
          example: "Paris"
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:00:00Z"
    FactInput:
      type: object
      properties:
        question:
          type: string
          description: The trivia question
        answer:
          type: string
          description: The answer
    