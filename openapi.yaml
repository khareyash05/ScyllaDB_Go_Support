openapi: 3.0.3
info:
  title: ScyllaDB Go Support API
  description: API for managing trivia facts.
  version: 1.0.0

paths:
  /api/health:
    get:
      summary: Health check
      description: Returns API health status for load balancers and probes.
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: trivia-api
  /api/facts:
    get:
      summary: List facts
      description: Returns a list of trivia facts.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of facts to return (default 100, max 1000)
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 1000
        - name: offset
          in: query
          required: false
          description: Number of facts to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: List of facts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fact"
    post:
      summary: Create a fact
      description: Creates a new trivia fact.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FactInput"
      responses:
        "201":
          description: Fact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
        "500":
          description: Server error
  /api/facts/{id}:
    get:
      summary: Get a fact by ID
      description: Returns a single trivia fact by its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Fact ID
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: The fact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
        "400":
          description: Invalid ID
        "404":
          description: Fact not found
    patch:
      summary: Update a fact
      description: Updates a trivia fact by ID. Accepts partial updates.
      parameters:
        - name: id
          in: path
          required: true
          description: Fact ID
          schema:
            type: integer
            minimum: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FactInput"
      responses:
        "200":
          description: The updated fact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fact"
        "400":
          description: Invalid ID or JSON
        "404":
          description: Fact not found
    delete:
      summary: Delete a fact
      description: Deletes a trivia fact by ID.
      parameters:
        - name: id
          in: path
          required: true
          description: Fact ID
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Fact deleted
        "400":
          description: Invalid ID
        "404":
          description: Fact not found

components:
  schemas:
    Fact:
      type: object
      properties:
        ID:
          type: integer
          description: Unique identifier
        question:
          type: string
          description: The trivia question
        answer:
          type: string
          description: The answer to the question
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    FactInput:
      type: object
      required:
        - question
        - answer
      properties:
        question:
          type: string
        answer:
          type: string
