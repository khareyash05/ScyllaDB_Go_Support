openapi: 3.0.3
info:
  title: ScyllaDB Go Support API
  description: API for managing trivia facts.
  version: 1.0.0

paths:
  /api/facts:
    get:
      summary: List facts
      description: Returns a list of trivia facts.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of facts to return (default 100, max 1000)
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10